name: Resumo Mensal de Despesas

on:
  schedule:
    # 09:00 no horário de Brasília (12:00 UTC) do dia 1 de cada mês
    - cron: "0 12 1 * *"
  workflow_dispatch: {}   # permite rodar manualmente pela aba "Actions" do GitHub, pra testar

jobs:
  enviar-resumo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install gspread google-auth pandas reportlab

      - name: Gerar e enviar resumo mensal
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_DESTINO: ${{ secrets.EMAIL_DESTINO }}
        run: python resumo_mensal.py
